---
# yaml-language-server: $schema=https://kubernetes-schemas.devbu.io/helmrelease_v2beta1.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: redisinsight
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 0.0.14
      sourceRef:
        kind: HelmRepository
        name: freekingdean
        namespace: flux-system
  maxHistory: 3
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    stateful: true
    image:
      repository: redis/redisinsight
      tag: 3.4.1
    env:
      TZ: America/New_York
      RI_APP_PORT: "5540"
      RI_APP_HOST: "0.0.0.0"
      RI_REDIS_HOST: redis-master.default.svc.cluster.local
      RI_REDIS_PORT: "6379"
      RI_REDIS_ALIAS: redis-master
    ports:
      http: 5540
    ingress:
      localonly: true
      subdomain: redisinsight
      icon: database
    persistence:
      data:
        existingClaim: config-redisinsight-0
        type: persistentVolumeClaim
        mountPath: /data
    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        memory: 1Gi
    serviceMonitor:
      enabled: false
