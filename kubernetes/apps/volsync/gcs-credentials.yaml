---
# ExternalSecret to pull GCP service account from 1Password
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: volsync-gcp-credentials
  namespace: volsync
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword-connect
    kind: ClusterSecretStore
  target:
    name: volsync-gcp-credentials
    creationPolicy: Owner
  data:
    - secretKey: service-account.json
      remoteRef:
        key: volsync-gcp-credentials
        version: v1
---
# ClusterSecretStore for GCP
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: volsync-gcp
  namespace: volsync
spec:
  provider:
    gcp:
      auth:
        secretRef:
          secretAccessKeySecretRef:
            name: volsync-gcp-credentials
            key: service-account.json
      serviceAccountKey:
        secretRef:
          secretAccessKeySecretRef:
            name: volsync-gcp-credentials
            key: service-account.json
