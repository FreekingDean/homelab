---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationDestination
metadata:
  name: volsync-gcs-destination
  namespace: volsync
spec:
  sourcePVC: null  # Will be set by trigger
  trigger:
    schedule: "0 2 * * *"  # Daily at 2 AM UTC
  restic:
    copyMethod: Snapshot  # Efficient: only copies changed blocks
    destinationPVC: volsync-destination-pvc
    capacity: 100Gi
    repository: volsync-restic-credentials
    cacheStorageClass: standard  # Use your fast storage for cache
    cacheCapacity: 20Gi
    maintenance:
      schedule: "0 3 * * 0"  # Weekly on Sunday at 3 AM
      ensureFreeSlots: 3
---
# PVC for cache (optional but recommended for performance)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: volsync-destination-pvc
  namespace: volsync
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Gi
  storageClassName: ceph-rbd  # UPDATE to match your storage class
