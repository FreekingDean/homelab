---
apiVersion: v1
kind: Secret
metadata:
  name: volsync-restic-credentials
  namespace: volsync
type: Opaque
stringData:
  RESTIC_REPOSITORY: "gs://your-homelab-backups/volsync"  # UPDATE THIS with your bucket name
  RESTIC_PASSWORD: "change-me-to-a-strong-password"       # UPDATE THIS!
---
# Alternative: Use a separate secret for the password
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: volsic-restic-password
  namespace: volsync
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: volsync-gcs
    kind: ClusterSecretStore
  target:
    name: volsync-restic-credentials
    template:
      type: Opaque
      data:
        RESTIC_REPOSITORY: "gs://your-homelab-backups/volsync"  # UPDATE THIS
        RESTIC_PASSWORD: "{{ .restic_password }}"
  data:
    - sourceRef:
        store: volsync-gcs
        remoteRef:
          key: restic-password
          version: v1
