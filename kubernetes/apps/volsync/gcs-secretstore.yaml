---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: volsync-gcs
  namespace: volsync
spec:
  provider:
    gcp:
      auth:
        secretRef:
          secretAccessKeySecretRef:
            name: volsync-gcs-credentials
            key: service-account.json
        workloadIdentity:
          clusterLocation: us-central1
          clusterName: main-cluster
          clusterProjectId: your-gcp-project-id  # UPDATE THIS
          serviceAccountRef:
            name: volsync-gcs-sa
            namespace: volsync
      serviceAccountKey:
        secretRef:
          secretAccessKeySecretRef:
            name: volsync-gcs-credentials
            key: service-account.json
---
# If you prefer using a static service account key instead of Workload Identity:
apiVersion: v1
kind: Secret
metadata:
  name: volsync-gcs-credentials
  namespace: volsync
type: Opaque
stringData:
  service-account.json: |
    {
      "type": "service_account",
      "project_id": "your-gcp-project-id",  # UPDATE THIS
      "private_key_id": "",
      "private_key": "",
      "client_email": "volsync@your-gcp-project-id.iam.gserviceaccount.com",
      "client_id": "",
      "auth_uri": "https://accounts.google.com/o/oauth2/auth",
      "token_uri": "https://oauth2.googleapis.com/token",
      "auth_provider_x509_cert_url": "https://www.googleapis.com/oauth2/v1/certs",
      "client_x509_cert_url": ""
    }
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-apps-volsync-gcs-secretstore
  namespace: flux-system
spec:
  dependsOn:
    - name: cluster-apps-external-secrets-stores
  path: ./kubernetes/apps/volsync
  prune: true
  sourceRef:
    kind: GitRepository
    name: home-kubernetes
  interval: 30m
  retryInterval: 1m
  timeout: 3m
