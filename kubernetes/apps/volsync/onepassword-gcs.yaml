---
# ExternalSecret to pull GCP credentials from 1Password
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: volsync-gcp-credentials
  namespace: volsync
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword-connect
    kind: ClusterSecretStore
  target:
    name: volsync-gcp-credentials
    creationPolicy: Owner
  data:
    - secretKey: service-account.json
      remoteRef:
        key: volsync-gcp-credentials  # 1Password vault/item path
        version: v1
---
# ClusterSecretStore for GCP using 1Password
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: volsync-gcp
  namespace: volsync
spec:
  provider:
    gcp:
      auth:
        secretRef:
          secretAccessKeySecretRef:
            name: volsync-gcp-credentials
            key: service-account.json
      serviceAccountKey:
        secretRef:
          secretAccessKeySecretRef:
            name: volsync-gcp-credentials
            key: service-account.json
---
# Kustomization for Flux
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-apps-volsync-gcp-config
  namespace: flux-system
spec:
  dependsOn:
    - name: cluster-apps-external-secrets-stores
  path: ./kubernetes/apps/volsync
  prune: true
  sourceRef:
    kind: GitRepository
    name: home-kubernetes
  interval: 30m
  retryInterval: 1m
  timeout: 3m
