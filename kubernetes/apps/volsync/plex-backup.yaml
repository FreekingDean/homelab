---
# Plex backup configuration
# Update the namespace and PVC name to match your setup
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: plex-backup
  namespace: default  # UPDATE: Change to your Plex namespace
spec:
  sourcePVC: config-plex-0  # UPDATE: Change to your Plex PVC name
  trigger:
    schedule: "0 1 * * *"  # Daily at 1 AM UTC
  restic:
    copyMethod: Snapshot
    repository: volsync-gcp-credentials
    capacity: 100Gi
    retain:
      hourly: 24   # Keep 24 hourly backups
      daily: 7     # Keep 7 daily backups
      weekly: 4    # Keep 4 weekly backups
      monthly: 12  # Keep 12 monthly backups
    cacheStorageClass: ceph-rbd
    cacheCapacity: 20Gi
