---
# ReplicationDestination for GCS + Restic backups
apiVersion: volsync.backube/v1alpha1
kind: ReplicationDestination
metadata:
  name: volsync-gcs-destination
  namespace: volsync
spec:
  sourcePVC: null
  trigger:
    schedule: "0 2 * * *"  # Daily at 2 AM UTC
  restic:
    copyMethod: Snapshot
    destinationPVC: volsync-destination-pvc
    capacity: 100Gi
    repository: volsync-gcp-credentials
    cacheStorageClass: ceph-rbd
    cacheCapacity: 20Gi
    maintenance:
      schedule: "0 3 * * 0"  # Weekly on Sunday at 3 AM
      ensureFreeSlots: 3
---
# PVC for cache (optional but recommended)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: volsync-destination-pvc
  namespace: volsync
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Gi
  storageClassName: ceph-rbd
