apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../../components/storage/volsync-pvc.yaml

configMapGenerator:
  - name: volsync-plex-config
    literals:
      - name=plex-config
      - namespace=default
      - size=50Gi
      - accessMode=ReadWriteOnce
      - storageClass=standard
      - schedule=0 2 * * *
      - retainHourly=24
      - retainDaily=7
      - retainWeekly=4
      - retainMonthly=12
      - cacheSize=20Gi

generatorOptions:
  disableNameSuffixHash: true
